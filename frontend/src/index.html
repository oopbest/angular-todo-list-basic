<!DOCTYPE html>
<html lang="th" ng-app="todoApp">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angular TodoList Basic</title>
  <!--
    หมายเหตุ: ไม่ต้องใส่ <script> หรือ <link> เอง
    HtmlWebpackPlugin จะ inject bundle.js ให้อัตโนมัติ
  -->
</head>
<body ng-controller="NavbarController as nav">

  <!-- Navbar -->
  <!-- 💡 ui-sref="stateName" สร้าง link ไปยัง state ที่กำหนดใน routes.js
       ui-sref-active="active" เพิ่ม class 'active' เมื่อ state นั้นถูกเลือก -->
  <nav class="navbar">
    <div class="navbar-brand">📝 TodoApp</div>
    <ul class="navbar-links">
      
      <!-- เมนูสำหรับคนที่ Login แล้ว -->
      <li ui-sref-active="active" ng-if="nav.isLoggedIn()">
        <a ui-sref="home">🏠 Home</a>
      </li>
      <li ui-sref-active="active" ng-if="nav.isLoggedIn()">
        <a ui-sref="about">ℹ️ About</a>
      </li>
      <li ui-sref-active="active" ng-if="nav.isLoggedIn()">
        <a ui-sref="settings">⚙️ Settings</a>
      </li>
      
      <!-- แสดงชื่อ และปุ่ม Logout กรณี Login แล้ว -->
      <li ng-if="nav.isLoggedIn()">
        <span class="nav-user">👤 {{ nav.getUsername() }}</span>
      </li>
      <li ng-if="nav.isLoggedIn()">
        <a href="#" ng-click="nav.logout()" class="nav-logout">🚪 Logout</a>
      </li>

      <!-- เมนูสำหรับคนที่ 'ยังไม่' Login -->
      <li ui-sref-active="active" ng-if="!nav.isLoggedIn()">
        <a ui-sref="login">🔑 Login</a>
      </li>
      <li ui-sref-active="active" ng-if="!nav.isLoggedIn()">
        <a ui-sref="register">📝 Register</a>
      </li>

    </ul>
  </nav>

  <!-- Main Content -->
  <!-- 💡 <ui-view> คือ container ที่ UI-Router จะใส่ template
       ของ state ปัจจุบันเข้ามาแสดง
       เมื่อเปลี่ยน state → template ใน ui-view จะเปลี่ยนอัตโนมัติ -->
  <div class="main-content">
    <ui-view></ui-view>
  </div>

</body>
</html>
