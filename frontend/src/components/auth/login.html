<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back 👋</h2>
      <p>เข้าสู่ระบบเพื่อจัดการ Todo ของคุณ</p>
    </div>

    <div class="alert alert-error" ng-if="$ctrl.error">
      ⚠️ {{ $ctrl.error }}
      <button class="alert-close" ng-click="$ctrl.error = null">&times;</button>
    </div>

    <form class="auth-form" ng-submit="$ctrl.login()">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          ng-model="$ctrl.user.username" 
          placeholder="กรอกชื่อผู้ใช้..." 
          required 
          autofocus
          ng-disabled="$ctrl.isLoading"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          ng-model="$ctrl.user.password" 
          placeholder="กรอกรหัสผ่าน..." 
          required
          ng-disabled="$ctrl.isLoading"
        >
      </div>

      <button type="submit" class="btn btn-primary" ng-disabled="!$ctrl.user.username || !$ctrl.user.password || $ctrl.isLoading">
        {{ $ctrl.isLoading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ' }}
      </button>
    </form>

    <div class="auth-footer">
      ยังไม่มีบัญชีใช่ไหม? <a ui-sref="register">สมัครสมาชิกที่นี่</a>
    </div>
  </div>
</div>
