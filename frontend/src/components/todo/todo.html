<div class="app-wrapper">
  <div class="todo-card">

    <!-- Header -->
    <div class="todo-header">
      <h1>📝 My Todo List</h1>
      <span class="todo-count">{{ $ctrl.remaining() }} รายการที่ยังค้างอยู่</span>
    </div>

    <!-- Error Alert -->
    <div class="alert alert-error" ng-if="$ctrl.error">
      ⚠️ {{ $ctrl.error }}
      <button class="alert-close" ng-click="$ctrl.error = null">&times;</button>
    </div>

    <!-- Input Form -->
    <form class="todo-form" ng-submit="$ctrl.addTodo()">
      <input
        type="text"
        class="todo-input"
        ng-model="$ctrl.newTodo"
        placeholder="เพิ่มรายการใหม่..."
        ng-disabled="$ctrl.isSaving"
        autofocus
      />
      <button type="submit" class="btn btn-add" ng-disabled="!$ctrl.newTodo.trim() || $ctrl.isSaving">
        {{ $ctrl.isSaving ? 'กำลังบันทึก...' : 'เพิ่ม' }}
      </button>
    </form>

    <!-- Filters -->
    <div class="todo-filters">
      <button 
        class="btn-filter" 
        ng-class="{ 'active': $ctrl.statusFilter === '' }" 
        ng-click="$ctrl.setFilter('')"
      >ทั้งหมด (All)</button>
      <button 
        class="btn-filter" 
        ng-class="{ 'active': $ctrl.statusFilter === 'active' }" 
        ng-click="$ctrl.setFilter('active')"
      >ค้างอยู่ (Active)</button>
      <button 
        class="btn-filter" 
        ng-class="{ 'active': $ctrl.statusFilter === 'completed' }" 
        ng-click="$ctrl.setFilter('completed')"
      >ทำแล้ว (Completed)</button>
    </div>

    <!-- Loading Spinner -->
    <div class="loader-container" ng-if="$ctrl.isLoading">
      <div class="spinner"></div>
      <p>กำลังโหลดข้อมูล...</p>
    </div>

    <!-- Todo List -->
    <ul class="todo-list" ng-if="!$ctrl.isLoading">
      <li
        class="todo-item"
        ng-repeat="todo in $ctrl.todos | filter: $ctrl.checkFilter"
        ng-class="{ 'done': todo.done }"
      >
        <!-- Checkbox Toggle -->
        <label class="todo-label">
          <input
            type="checkbox"
            ng-model="todo.done"
            ng-change="$ctrl.updateTodo(todo)"
            class="todo-checkbox"
          />
          <span class="todo-text">{{ todo.text }}</span>
        </label>

        <!-- Delete Button -->
        <button
          class="btn btn-delete"
          ng-click="$ctrl.removeTodo(todo._id)"
          title="ลบรายการนี้"
        >
          ✕
        </button>
      </li>

      <!-- Empty State -->
      <li class="todo-empty" ng-if="$ctrl.todos.length === 0 && !$ctrl.isLoading">
        ยังไม่มีรายการ ลองเพิ่มดูสิ! 🎉
      </li>
    </ul>

    <!-- Footer Actions -->
    <div class="todo-footer" ng-if="$ctrl.todos.length > 0">
      <span class="todo-stats">
        ทำแล้ว {{ $ctrl.doneCount() }} / {{ $ctrl.todos.length }} รายการ
      </span>
      <button
        class="btn btn-clear"
        ng-click="$ctrl.clearDone()"
        ng-if="$ctrl.doneCount() > 0"
      >
        ลบรายการที่ทำแล้ว
      </button>
    </div>

  </div>
</div>
